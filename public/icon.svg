<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#b197fc"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Cat face -->
  <circle cx="256" cy="280" r="140" fill="#ffd43b"/>
  
  <!-- Left ear -->
  <polygon points="146,180 116,60 196,140" fill="#ffd43b"/>
  <polygon points="156,170 130,80 186,145" fill="#ff6b6b"/>
  
  <!-- Right ear -->
  <polygon points="366,180 396,60 316,140" fill="#ffd43b"/>
  <polygon points="356,170 382,80 326,145" fill="#ff6b6b"/>
  
  <!-- Left eye -->
  <ellipse cx="206" cy="255" rx="22" ry="25" fill="#1a1a2e"/>
  <ellipse cx="212" cy="248" rx="8" ry="10" fill="#ffffff"/>
  
  <!-- Right eye -->
  <ellipse cx="306" cy="255" rx="22" ry="25" fill="#1a1a2e"/>
  <ellipse cx="312" cy="248" rx="8" ry="10" fill="#ffffff"/>
  
  <!-- Nose -->
  <ellipse cx="256" cy="300" rx="12" ry="8" fill="#ff6b6b"/>
  
  <!-- Mouth -->
  <path d="M244,315 Q256,330 268,315" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left whiskers -->
  <line x1="100" y1="280" x2="186" y2="295" stroke="#1a1a2e" stroke-width="2.5"/>
  <line x1="100" y1="300" x2="186" y2="305" stroke="#1a1a2e" stroke-width="2.5"/>
  <line x1="100" y1="320" x2="186" y2="315" stroke="#1a1a2e" stroke-width="2.5"/>
  
  <!-- Right whiskers -->
  <line x1="412" y1="280" x2="326" y2="295" stroke="#1a1a2e" stroke-width="2.5"/>
  <line x1="412" y1="300" x2="326" y2="305" stroke="#1a1a2e" stroke-width="2.5"/>
  <line x1="412" y1="320" x2="326" y2="315" stroke="#1a1a2e" stroke-width="2.5"/>
  
  <!-- Sparkle decorations -->
  <text x="100" y="160" font-size="48" fill="#ffffff">✨</text>
  <text x="360" y="160" font-size="48" fill="#ffffff">✨</text>
  <text x="380" y="420" font-size="36" fill="#ffffff">🎮</text>
</svg>
